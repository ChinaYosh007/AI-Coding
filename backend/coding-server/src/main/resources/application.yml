server:
  port: 8080
  servlet:
    context-path: /api
  reactive:
    session:
      cookie:
        max-age: 2592000 # 30 days
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: AI-Coding
    session:
      store-type: redis
      timeout: 2592000
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:coding-server/.env[.properties]
  profiles:
    active: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_URL}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000
    username: ${MYSQL_ACCOUNT}
    password: ${MYSQL_PASSWORD}
    hikari:
      initialization-fail-timeout: 5000
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT:10000}
      validation-timeout: ${MYSQL_VALIDATION_TIMEOUT:3000}
      keepalive-time: ${MYSQL_KEEPALIVE_TIME:30000}
      max-lifetime: ${MYSQL_MAX_LIFETIME:120000}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      ttl: 2592000
      timeout: 30000
      connect-timeout: 30000
      retry-attempts: 3
      retry-interval: 1500
logging:
  file:
    name: logs/ai-coding.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  level:
    root: info
    com.yosh.coding: debug
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: ${AGENT_URL:https://api.deepseek.com}
      api-key: ${API_KEY}
      model-name: ${CHAT_MODEL:deepseek-v4-flash}
      log-requests: true
      log-responses: true
      max-tokens: 8192
      strict-json-schema: true
      response-format: json_object
      max-retries: 3
    tool-calling-chat-model:
      base-url: ${AGENT_URL:https://api.deepseek.com}
      api-key: ${REASONING_API_KEY}
      model-name: ${REASONING_MODEL:deepseek-v4-pro}
      max-tokens: 8192
      temperature: 0.1
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: ${AGENT_URL:https://api.deepseek.com}
      api-key: ${API_KEY}
      model-name: ${STREAM_MODEL:deepseek-v4-flash}
      max-tokens: 8192
      log-requests: true
      log-responses: true
        # 推理 AI 模型配置（用于复杂的推理任务）
    reasoning-streaming-chat-model:
      base-url: ${AGENT_URL:https://api.deepseek.com}
      api-key: ${REASONING_API_KEY}
      model-name: ${REASONING_MODEL:deepseek-v4-pro}
      max-tokens: 8192
      temperature: 0.1
      log-requests: true
      log-responses: true
        # 智能路由 AI 模型配置（用于简单的分类任务）
    routing-chat-model:
      base-url: ${AGENT_URL:https://api.deepseek.com}
      api-key: ${ROUTING_API_KEY}
      model-name: ${ROUTING_MODEL:deepseek-v4-flash}
      log-requests: true
      log-responses: true

oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
# 阿里云 DashScope 配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY}
  image-model: wan2.2-t2i-flash

pexels:
  api-key: ${PEXELS_API_KEY}
cleanup:
  logic-deleted:
    cron: "0 */3 * * * *"
    zone: "Asia/Shanghai"

